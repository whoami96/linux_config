# ==============================================================================
# Alacritty — WhoAmI setup (Ubuntu 24.04)
# Hardware: Thinkpad T490
# Version: 0.13.2
# ==============================================================================

live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
size = 11

[font.normal]
family = "UbuntuSansMono Nerd Font"
style = "Regular"

[font.bold]
family = "UbuntuSansMono Nerd Font"
style = "Bold"

[font.italic]
family = "UbuntuSansMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "UbuntuSansMono Nerd Font"
style = "Bold Italic"

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[window]
dimensions = { columns = 105, lines = 35 }
startup_mode = "Windowed"
decorations = "Full"
decorations_theme_variant = "Dark"
dynamic_title = true
dynamic_padding = true
opacity = 0.88
title = "Alacritty"
class = { instance = "Alacritty", general = "Alacritty" }

[scrolling]
history = 50000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>‹›*\t"

[cursor]
style = { shape = "Beam", blinking = "Always" }

[mouse]
hide_when_typing = true

# -------- URL hints overlay (Ctrl+Shift+O) --------
[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`\\\\]+"

# -------------------- Key bindings --------------------

# Copy/Paste
[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

# Scrollback search
[[keyboard.bindings]]
action = "SearchForward"
key = "F"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SearchBackward"
key = "B"
mods = "Control|Shift"

# Vi mode
[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ClearSelection"
key = "C"
mods = "Control|Shift"
mode = "Vi"

# Paste Primary Selection
[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

# Font size controls
[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Plus"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "NumpadAdd"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "NumpadSubtract"
mods = "Control"

# Fullscreen
[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

# Middle-click paste
[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"
