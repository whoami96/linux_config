// ============================================================================
// LogiOps configuration — MX Master 3
// Author: Paweł Owczarczyk
// Descriptions: DPI 1600 + Global Nav + Window Management
// ============================================================================

devices: (
  {
    name: "Wireless Mouse MX Master 3";
    dpi: 1600;
    smartshift: { on: true; threshold: 15; };

    hiresscroll: {
      hires: true;
      invert: false;
      target: false;
    };

    thumbwheel: { divert: false; };

    buttons: (
      {
        cid: 0x53;
        action = { type: "Keypress"; keys: [ "KEY_BACK" ]; };
      },
      {
        cid: 0x56;
        action = { type: "Keypress"; keys: [ "KEY_FORWARD" ]; };
      },

      {
        cid: 0xc3;
        action = {
          type: "Gestures";
          gestures: (
            { direction: "None";  mode: "OnRelease"; action = { type: "Keypress"; keys: [ "KEY_LEFTMETA" ]; }; },

            { direction: "Right"; mode: "OnRelease"; action = { type: "Keypress"; keys: [ "KEY_LEFTMETA", "KEY_PAGEDOWN" ]; }; },

            { direction: "Left";  mode: "OnRelease"; action = { type: "Keypress"; keys: [ "KEY_LEFTMETA", "KEY_PAGEUP" ]; }; },

            { direction: "Up";    mode: "OnRelease"; action = { type: "Keypress"; keys: [ "KEY_LEFTMETA", "KEY_UP" ]; }; },

            { direction: "Down";  mode: "OnRelease"; action = { type: "Keypress"; keys: [ "KEY_LEFTMETA", "KEY_DOWN" ]; }; }
          );
        };
      },

      { cid: 0xc4; action = { type: "ToggleSmartShift"; }; }
    );
  }
);
